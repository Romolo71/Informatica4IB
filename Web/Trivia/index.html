<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia - Riccardo Tonini</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">Trivia</div>

    <main>
        <div class="container">
            <div id="setup">
                <div class="campo">
                    <label>Quante domande?</label>
                    <input type="number" id="n" value="10">
                </div>
                
                <div class="campo">
                    <label>Categoria</label>
                    <select id="c">
                        <option value="9">Cultura Generale</option>
                        <option value="22">Geografia</option>
                        <option value="23">Storia</option>
                        <option value="21">Sport</option>
                        <option value="11">Film</option>
                    </select>
                </div>
                
                <div class="campo">
                    <label>Difficoltà</label>
                    <select id="d">
                        <option value="easy">Facile</option>
                        <option value="medium">Media</option>
                        <option value="hard">Difficile</option>
                    </select>
                </div>
                <button id="btn-start">INIZIA QUIZ</button>
            </div>

            <div id="gioco" class="nascosto">
                <div class="info-quiz">
                    <span id="contatore"></span>
                    <span id="titolo-cat"></span>
                </div>
                <div id="testo"></div>
                <div id="risposte"></div>
                <button id="btn-next">CONFERMA</button>
            </div>

            <div id="fine" class="nascosto">
                <h2>Risultato Finale</h2>
                <p id="ris"></p>
                <button id="btn-reload">RIPROVA</button>
            </div>
        </div>
    </main>

    <footer class="footer-universale">
        <img src="rtonini.ico" alt="Logo" class="footer-logo">
        
        <div class="footer-testo">
            28/03/2026 Riccardo Tonini - Trovi altri miei progetti 
            <a href="https://rtonini.it" target="_blank">QUI</a>
        </div>

        <img src="rtonini.ico" alt="Logo" class="footer-logo">
    </footer>

    <script src="script.js"></script>
</body>
</html>
